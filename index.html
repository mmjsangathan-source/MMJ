<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মানুষ মানুষের জন্য সংগঠন - সেচ্ছাসেবক ফর্ম</title>
<style>
  /* ================= Body & Animated Background ================= */
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff6a00, #ffb347);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
  }
  @keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  .form-container {
    background: rgba(255,255,255,0.97);
    padding: 50px 40px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    text-align: center;
    width: 100%;
    max-width: 500px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 1.5s ease forwards;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
  }

  /* ================= Organization Name ================= */
  .org-name {
    font-size: 32px;
    font-weight: 900;
    color: #2c3e50;
    margin-bottom: 8px;
    animation: floatTitle 4s ease-in-out infinite;
  }
  .form-subtitle {
    font-size: 18px;
    font-weight: 600;
    color: #3498db;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeInSub 2s forwards 0.5s;
  }
  @keyframes floatTitle {
    0%,100%{ transform: translateY(0);}
    50%{ transform: translateY(-12px);}
  }
  @keyframes fadeInSub { to {opacity:1;} }

  /* ================= Input Styling ================= */
  input, textarea {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 16px;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 15px rgba(52,152,219,0.3);
  }

  /* ================= Button Styling ================= */
  button {
    position: relative;
    overflow: hidden;
    padding: 14px;
    margin-top: 15px;
    border: none;
    background: linear-gradient(45deg,#3498db,#2ecc71);
    color: white;
    font-size: 17px;
    font-weight: bold;
    border-radius: 14px;
    cursor: pointer;
    width: 100%;
    transition: all 0.3s ease;
    animation: pulse 2s infinite;
  }
  button:hover {
    background: linear-gradient(45deg,#2ecc71,#3498db);
    transform: scale(1.05);
  }
  @keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
  }

  /* ================= Success Message ================= */
  #successMsg {
    margin-top: 15px;
    color: green;
    font-weight: bold;
    display: none;
    animation: fadeIn 1s forwards;
  }

  /* ================= Honeypot (hidden field) ================= */
  .honeypot {
    display: none;
  }
</style>
</head>
<body>

<div class="form-container">
  <div class="org-name">মানুষ মানুষের জন্য সংগঠনের</div>
  <div class="form-subtitle">সেচ্ছাসেবক ফর্ম</div>

  <form id="volunteerForm" action="https://formspree.io/f/xykbzoqa" method="POST">
    <!-- Honeypot field for spam bots -->
    <input type="text" name="website" class="honeypot" placeholder="আপনি পূরণ করবেন না">

    <input type="text" name="name" placeholder="আপনার নাম" required>
    <input type="text" name="address" placeholder="আপনার ঠিকানা" required>
    <input type="text" name="phone" placeholder="মোবাইল নম্বর" required>
    <textarea name="message" rows="4" placeholder="আপনার বার্তা"></textarea>
    <button type="submit">সাবমিট করুন</button>
  </form>

  <div id="successMsg"></div>
</div>

<script>
const form = document.getElementById('volunteerForm');
const successMsg = document.getElementById('successMsg');

form.addEventListener('submit', function(e){
  e.preventDefault();
  const honeypot = form.querySelector('.honeypot');
  if(honeypot.value !== '') return; // spam detected

  const data = new FormData(form);

  fetch(form.action, {
    method: 'POST',
    body: data,
    headers:{'Accept':'application/json'}
  })
  .then(response=>{
    if(response.ok){
      successMsg.style.display="block";
      successMsg.textContent="ধন্যবাদ! আপনার ফর্ম সফলভাবে সাবমিট হয়েছে।";
      form.reset();
    } else {
      response.json().then(data=>{
        if(data.errors){
          successMsg.style.display="block";
          successMsg.textContent = data.errors.map(e=>e.message).join(", ");
        }
      });
    }
  })
  .catch(err=>{
    successMsg.style.display="block";
    successMsg.textContent="দুঃখিত, ফর্ম সাবমিট করা যায়নি।";
  });
});
</script>

</body>
</html>
